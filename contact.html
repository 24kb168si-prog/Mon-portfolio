<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | NOREDIE</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html">Mon portfolio</a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="projets.html">Projets</a></li>
                <li><a href="passions.html">Passions</a></li>
                <li><a href="divertissement.html">Divertissement</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="header-section">
            <h1>Contactez-moi</h1>
            <div class="underline"></div>
            <p>Basé à Lubumbashi, je suis disponible pour vos projets.</p>
        </div>

        <div class="contact-wrapper">
            <div class="contact-info">
                <h3>Mes coordonnées</h3>
                <p><i class="fa-solid fa-location-dot"></i> Lubumbashi, RD Congo</p>
                <p><i class="fa-solid fa-phone"></i> +243 998 255 602</p>
                
                <div class="social-contact">
                    <a href="https://wa.me/243998255602" class="btn-contact whatsapp" target="_blank">
                        <i class="fa-brands fa-whatsapp"></i> WhatsApp
                    </a>
                    <a href="https://t.me/+243998255602" class="btn-contact telegram" target="_blank">
                        <i class="fa-brands fa-telegram"></i> Telegram
                    </a>
                </div>
            </div>

            <div class="contact-form-container">
                <form action="#" method="POST" class="contact-form">
                    <div class="form-group">
                        <input type="text" id="name" name="name" placeholder=" " required>
                    </div>
                    <div class="form-group">
                        <input type="tel" id="phone" name="phone" placeholder="Votre numéro de téléphone" required>
                    </div>
                    <div class="form-group">
                        <textarea id="message" name="message" rows="5" placeholder="Votre message..." required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Envoyer</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 NOREDIE. Tous droits réservés.</p>
        <div class="social-links">
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
            <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
        </div>
    </footer>

</body>
</html>
